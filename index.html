let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ── 辅助函数 ──
function tileAt(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return TILE.STEEL;
  return map[row * COLS + col];
}
function setTile(col, row, v) {
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    map[row * COLS + col] = v;
  }
}
function pxToCol(x) { return Math.floor(x / TILE_SIZE); }
function pxToRow(y) { return Math.floor(y / TILE_SIZE); }
function centerCol(x) { return Math.floor((x + TILE_SIZE / 2) / TILE_SIZE); }
function centerRow(y) { return Math.floor((y + TILE_SIZE / 2) / TILE_SIZE); }

// ── 粒子系统 ──
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      size: 1 + Math.random() * 3,
    });
  }
}

// ── 道具 ──
const POWERUP = { SPEED: 'speed', SHIELD: 'shield', MULTI: 'multi', LIFE: 'life' };
const POWERUP_COLORS = { speed: '#00ffff', shield: '#ffcc00', multi: '#ff00ff', life: '#ff6666' };
const POWERUP_LABELS = { speed: '⚡', shield: '🛡', multi: '💥', life: '❤' };

function spawnPowerUp(col, row) {
  const types = Object.values(POWERUP);
  const type = types[Math.floor(Math.random() * types.length)];
  powerUps.push({
    x: col * TILE_SIZE + TILE_SIZE / 2,
    y: row * TILE_SIZE + TILE_SIZE / 2,
    col, row,
    type,
    life: 600,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

// ── 坦克类 ──
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x;          // pixel position (center of tank)
    this.y = y;
    this.dir = dir;      // 0=up, 1=right, 2=down, 3=left
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2.5 : 1.2 + level * 0.2;
    this.size = 16;
    this.bulletSpeed = isPlayer ? 7 : 4;
    this.reloadTime = isPlayer ? 20 : 40 + Math.random() * 40;
    this.reload = isPlayer ? 0 : 20;
    this.alive = true;
    this.shield = isPlayer ? 90 : 0;
    this.shieldActive = false;
    this.multiShot = false;
    this.speedBoost = 0;
    this.flashTimer = 0;
    this.trackOffset = 0;
  }

  getBounds() {
    return {
      left: this.x - this.size,
      right: this.x + this.size,
      top: this.y - this.size,
      bottom: this.y + this.size,
    };
  }

  collidesWithMap(nx, ny, dx, dy) {
    const b = {
      left: nx - this.size + 4,
      right: nx + this.size - 4,
      top: ny - this.size + 4,
      bottom: ny + this.size - 4,
    };
    const solid = (t) => t === TILE.BRICK || t === TILE.STEEL || t === TILE.WATER || t === TILE.BASE_BRICK;
    // 方向感知碰撞: 只检查移动方向的前沿，允许沿墙滑动
    if (dx > 0) { // 向右移动，只检查右边
      const col = pxToCol(b.right);
      for (let r = pxToRow(b.top); r <= pxToRow(b.bottom); r++) {
        if (solid(tileAt(col, r))) return true;
      }
    }
    if (dx < 0) { // 向左移动，只检查左边
      const col = pxToCol(b.left);
      for (let r = pxToRow(b.top); r <= pxToRow(b.bottom); r++) {
        if (solid(tileAt(col, r))) return true;
      }
    }
    if (dy > 0) { // 向下移动，只检查底边
      const row = pxToRow(b.bottom);
      for (let c = pxToCol(b.left); c <= pxToCol(b.right); c++) {
        if (solid(tileAt(c, row))) return true;
      }
    }
    if (dy < 0) { // 向上移动，只检查顶边
      const row = pxToRow(b.top);
      for (let c = pxToCol(b.left); c <= pxToCol(b.right); c++) {
        if (solid(tileAt(c, row))) return true;
      }
    }
    return false;
  }

  collidesWithTank(other) {
    const dx = this.x - other.x;
    const dy = this.y - other.y;
    return Math.abs(dx) < this.size * 2 - 6 && Math.abs(dy) < this.size * 2 - 6;
  }

  move(dx, dy, newDir) {
    this.dir = newDir;
    const nx = this.x + dx;
    const ny = this.y + dy;
    // 边界检查
    if (nx - this.size < 0 || nx + this.size > WIDTH || ny - this.size < 0 || ny + this.size > HEIGHT) {
      return false;
    }
    // 地图碰撞 (方向感知，只检查移动前沿)
    if (this.collidesWithMap(nx, ny, dx, dy)) return false;
    // 其他坦克碰撞 (包括敌人之间)
    const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this && e.alive)];
    for (const t of allTanks) {
      if (!t || !t.alive) continue;
      const dx2 = nx - t.x;
      const dy2 = ny - t.y;
      if (Math.abs(dx2) < this.size * 2 - 4 && Math.abs(dy2) < this.size * 2 - 4) return false;
    }
    // 道具不阻挡
    this.x = nx;
    this.y = ny;
    this.trackOffset += Math.abs(dx) + Math.abs(dy);
    return true;
  }

  shoot() {
    if (this.reload > 0) return null;
    this.reload = this.reloadTime;
    const bullets = [];
    const bx = this.x + (this.dir === 1 ? this.size + 4 : this.dir === 3 ? -this.size - 4 : 0);
    const by = this.y + (this.dir === 2 ? this.size + 4 : this.dir === 0 ? -this.size - 4 : 0);
    bullets.push(new Bullet(bx, by, this.dir, this.bulletSpeed, this.isPlayer));
    if (this.multiShot) {
      bullets.push(new Bullet(bx + 8, by + 8, this.dir, this.bulletSpeed, this.isPlayer));
      bullets.push(new Bullet(bx - 8, by - 8, this.dir, this.bulletSpeed, this.isPlayer));
    }
    return bullets;
  }

  update() {
    if (!this.alive) return;
    if (this.reload > 0) this.reload--;
    if (this.shield > 0) this.shield--;
    if (this.shieldActive && this.shield <= 0) this.shieldActive = false;
    if (this.flashTimer > 0) this.flashTimer--;
    if (this.speedBoost > 0) this.speedBoost--;
    // 道具拾取
    if (this.isPlayer) {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        const dx = this.x - p.x;
        const dy = this.y - p.y;
        if (Math.abs(dx) < this.size + 12 && Math.abs(dy) < this.size + 12) {
          this.applyPowerUp(p.type);
          powerUps.splice(i, 1);
          playSound(600, 0.2, 'sine', 0.1);
        }
      }
    }
  }

  applyPowerUp(type) {
    switch (type) {
      case POWERUP.SPEED: this.speedBoost = 300; break;
      case POWERUP.SHIELD: this.shield = 400; this.shieldActive = true; break;
      case POWERUP.MULTI: this.multiShot = true; setTimeout(() => { this.multiShot = false; }, 10000); break;
      case POWERUP.LIFE: if (lives < 5) lives++; updateUI(); break;
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.flashTimer > 0 && Math.floor(this.flashTimer / 3) % 2 === 0) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate((this.dir * Math.PI) / 2);

    const s = this.size;

    // 履带动画
    const trackPhase = (this.trackOffset % 8) / 8;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-s, -s, s * 0.45, s * 2);
    ctx.fillRect(s - s * 0.45, -s, s * 0.45, s * 2);
    // 履带纹路
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for (let i = -s + 4; i < s; i += 6) {
      const ty = i + trackPhase * 6;
      ctx.beginPath();
      ctx.moveTo(-s + 2, ty);
      ctx.lineTo(-s + s * 0.45 - 2, ty);
      ctx.moveTo(s - s * 0.45 + 2, ty);
      ctx.lineTo(s - 2, ty);
      ctx.stroke();
    }

    // 车身
    const bodyGrad = ctx.createLinearGradient(0, -s, 0, s);
    if (this.isPlayer) {
      bodyGrad.addColorStop(0, '#4CAF50');
      bodyGrad.addColorStop(0.5, '#388E3C');
      bodyGrad.addColorStop(1, '#2E7D32');
    } else {
      bodyGrad.addColorStop(0, this.color);
      bodyGrad.addColorStop(0.5, this.color);
      bodyGrad.addColorStop(1, '#333');
    }
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-s * 0.7, -s * 0.85, s * 1.4, s * 1.7);

    // 炮塔座
    ctx.fillStyle = this.isPlayer ? '#81C784' : '#ddd';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = this.isPlayer ? '#66BB6A' : '#bbb';
    ctx.fillRect(-3, -s * 1.1, 6, s * 1.15);

    // 炮管口
    ctx.fillStyle = '#222';
    ctx.fillRect(-4, -s * 1.15, 8, 6);

    // 护盾效果
    if (this.shieldActive) {
      ctx.strokeStyle = `rgba(255, 200, 0, ${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 1.15, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 加速效果
    if (this.speedBoost > 0) {
      ctx.strokeStyle = `rgba(0, 255, 255, ${0.4 + Math.sin(frameCount * 0.3) * 0.3})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.arc(0, 0, s * 1.25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

// ── 子弹类 ──
class Bullet {
  constructor(x, y, dir, speed, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = speed;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.size = 4;
  }

  update() {
    if (!this.alive) return;
    switch (this.dir) {
      case 0: this.y -= this.speed; break;
      case 1: this.x += this.speed; break;
      case 2: this.y += this.speed; break;
      case 3: this.x -= this.speed; break;
    }
    // 边界
    if (this.x < 0 || this.x > WIDTH || this.y < 0 || this.y > HEIGHT) {
      this.alive = false;
      return;
    }
    // 地图碰撞
    const col = pxToCol(this.x);
    const row = pxToRow(this.y);
    const t = tileAt(col, row);
    if (t === TILE.BRICK || t === TILE.BASE_BRICK) {
      setTile(col, row, TILE.EMPTY);
      spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#cc8844');
      this.alive = false;
      playSound(200, 0.1, 'square', 0.05);
    } else if (t === TILE.STEEL) {
      spawnParticles(this.x, this.y, '#888888', 5);
      this.alive = false;
      playSound(100, 0.1, 'triangle', 0.06);
    }
  }

  hitsTank(tank) {
    if (!tank.alive) return false;
    return Math.abs(this.x - tank.x) < tank.size && Math.abs(this.y - tank.y) < tank.size;
  }

  draw(ctx) {
    if (!this.alive) return;
    ctx.fillStyle = this.isPlayer ? '#ffeb3b' : '#ff5252';
    ctx.shadowColor = this.isPlayer ? '#ffeb3b' : '#ff5252';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // 弹道尾迹
    ctx.fillStyle = this.isPlayer ? 'rgba(255,235,59,0.5)' : 'rgba(255,82,82,0.5)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size + 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── 玩家AI动作 ──
function playerShoot() {
  if (!player.alive) return;
  const newBullets = player.shoot();
  if (newBullets) {
    for (const b of newBullets) bullets.push(b);
    playSound(800, 0.08, 'square', 0.04);
  }
}

function playerMove() {
  if (!player.alive) return;
  const spd = player.speed + (player.speedBoost > 0 ? 1.5 : 0);
  let moved = false;
  if (keys['w'] || keys['arrowup'])    moved = player.move(0, -spd, 0);
  else if (keys['s'] || keys['arrowdown'])  moved = player.move(0, spd, 2);
  else if (keys['a'] || keys['arrowleft'])  moved = player.move(-spd, 0, 3);
  else if (keys['d'] || keys['arrowright']) moved = player.move(spd, 0, 1);
}

// ── 敌人AI ──
function updateEnemyAI(enemy) {
  if (!enemy.alive) return;

  // 随机改变方向
  if (Math.random() < 0.015) {
    enemy.aiDir = Math.floor(Math.random() * 4);
    enemy.aiTimer = 30 + Math.random() * 60;
  }

  // 检测玩家方向，有机会时射击
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  let aimDir = enemy.aiDir;
  if (dist < 300 && Math.random() < 0.03) {
    if (Math.abs(dx) > Math.abs(dy)) {
      aimDir = dx > 0 ? 1 : 3;
    } else {
      aimDir = dy > 0 ? 2 : 0;
    }
    // 射击
    if (Math.random() < 0.4) {
      const newBullets = enemy.shoot();
      if (newBullets) {
        for (const b of newBullets) bullets.push(b);
        playSound(400, 0.06, 'square', 0.03);
      }
    }
  }

  // 移动
  if (enemy.aiTimer <= 0) {
    enemy.aiDir = Math.floor(Math.random() * 4);
    enemy.aiTimer = 30 + Math.random() * 60;
  }
  enemy.aiTimer--;

  const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
  const [ddx, ddy] = dirs[aimDir];
  const spd = enemy.speed;
  if (!enemy.move(ddx * spd, ddy * spd, aimDir)) {
    // 被挡住就换方向
    enemy.aiDir = Math.floor(Math.random() * 4);
    enemy.aiTimer = 10 + Math.random() * 30;
    const [ddx2, ddy2] = dirs[enemy.aiDir];
    enemy.move(ddx2 * spd, ddy2 * spd, enemy.aiDir);
  }
}

// ── 生成敌人 ──
function spawnEnemy() {
  const spawnPoints = [
    [0, 0], [COLS - 1, 0], [0, ROWS - 1], [COLS - 1, ROWS - 1],
    [COLS / 2, 0], [0, ROWS / 2], [COLS - 1, ROWS / 2], [COLS / 2, ROWS - 1],
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  const x = sp[0] * TILE_SIZE + TILE_SIZE / 2;
  const y = sp[1] * TILE_SIZE + TILE_SIZE / 2;
  const colors = ['#e53935', '#ff7043', '#ab47bc', '#42a5f5', '#ef5350', '#f44336', '#ff5722'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const dir = Math.floor(Math.random() * 4);
  const enemy = new Tank(x, y, dir, color, false);
  enemy.aiDir = dir;
  enemy.aiTimer = 30;
  enemy.speed = 1.0 + level * 0.3;
  // 高级敌人可能更快
  if (level >= 3 && Math.random() < 0.3) enemy.speed += 0.8;
  if (level >= 4 && Math.random() < 0.2) enemy.speed += 1.0;
  enemies.push(enemy);
}

// ── 关卡初始化 ──
function loadLevel(lvl) {
  const idx = (lvl - 1) % LEVELS.length;
  map = [...LEVELS[idx]];
  // 动态添加更多砖块
  if (lvl > LEVELS.length) {
    for (let i = 0; i < lvl * 5; i++) {
      const c = Math.floor(Math.random() * COLS);
      const r = 1 + Math.floor(Math.random() * (ROWS - 2));
      if (map[r * COLS + c] === TILE.EMPTY) {
        map[r * COLS + c] = Math.random() < 0.85 ? TILE.BRICK : TILE.STEEL;
      }
    }
  }
  player = new Tank(WIDTH / 2, HEIGHT - TILE_SIZE * 1.5, 0, '#4CAF50', true);
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];
  spawnQueue = [];
  // 本关需要消灭的敌人数量
  const totalEnemies = 4 + lvl * 2;
  for (let i = 0; i < totalEnemies; i++) spawnQueue.push(i);
  spawnTimer = 0;
}

// ── UI更新 ──
function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  levelDisplayEl.textContent = level;
}

// ── 游戏重置 ──
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  loadLevel(1);
  updateUI();
}

// ── 主循环 ──
function gameLoop() {
  frameCount++;
  if (gameState === 'playing') {
    update();
  }
  render();
  requestAnimationFrame(gameLoop);
}

function update() {
  // 玩家
  playerMove();
  if (keys[' '] || keys['j']) {
    playerShoot();
    keys[' '] = false;
    keys['j'] = false;
  }
  player.update();

  // 敌人生成
  if (spawnQueue.length > 0) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnQueue.pop();
      spawnTimer = 40 + Math.random() * 30;
    }
  }

  // 敌人AI
  for (const enemy of enemies) {
    updateEnemyAI(enemy);
    enemy.update();
    // 敌人随机射击
    if (Math.random() < 0.008 * (1 + level * 0.3)) {
      const newBullets = enemy.shoot();
      if (newBullets) {
        for (const b of newBullets) bullets.push(b);
      }
    }
  }

  // 子弹更新
  for (const bullet of bullets) bullet.update();

  // 子弹碰撞检测
  for (const bullet of bullets) {
    if (!bullet.alive) continue;
    if (bullet.isPlayer) {
      // 玩家子弹打敌人
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (bullet.hitsTank(enemy)) {
          bullet.alive = false;
          enemy.alive = false;
          if (enemy.shieldActive) {
            enemy.alive = true;
            enemy.shield = 0;
            enemy.shieldActive = false;
            spawnParticles(enemy.x, enemy.y, '#ffcc00', 20);
            playSound(300, 0.15, 'triangle', 0.06);
          } else {
            spawnParticles(enemy.x, enemy.y, enemy.color, 25);
            playSound(150, 0.2, 'sawtooth', 0.08);
            score += 100 * level;
            shakeAmount = 4;
            shakeDuration = 8;
            // 概率掉落道具
            if (Math.random() < 0.2) {
              spawnPowerUp(pxToCol(enemy.x), pxToRow(enemy.y));
            }
          }
          updateUI();
        }
      }
    } else {
      // 敌人子弹打玩家
      if (player.alive && bullet.hitsTank(player)) {
        bullet.alive = false;
        if (player.shieldActive) {
          player.shield -= 50;
          if (player.shield <= 0) player.shieldActive = false;
          spawnParticles(player.x, player.y, '#ffcc00', 15);
          playSound(300, 0.15, 'triangle', 0.06);
        } else {
          spawnParticles(player.x, player.y, '#4CAF50', 30);
          playSound(80, 0.4, 'sawtooth', 0.12);
          shakeAmount = 8;
          shakeDuration = 15;
          playerDie();
        }
      }
    }
  }

  // 清理
  bullets = bullets.filter(b => b.alive);
  enemies = enemies.filter(e => e.alive);
  particles = particles.filter(p => p.life > 0);
  powerUps = powerUps.filter(p => p.life > 0);

  // 粒子更新
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  for (const p of powerUps) p.life--;

  // 屏幕震动
  if (shakeDuration > 0) shakeDuration--;

  // 检查胜利条件
  if (spawnQueue.length === 0 && enemies.length === 0) {
    levelClear();
  }
}

function playerDie() {
  lives--;
  updateUI();
  if (lives <= 0) {
    gameOver();
    return;
  }
  // 重生
  player.alive = false;
  setTimeout(() => {
    if (gameState !== 'playing') return;
    player.x = WIDTH / 2;
    player.y = HEIGHT - TILE_SIZE * 1.5;
    player.dir = 0;
    player.alive = true;
    player.shield = 120;
    player.shieldActive = true;
    player.reload = 0;
  }, 1000);
}

function levelClear() {
  gameState = 'level-transition';
  score += 500 * level;
  updateUI();
  level++;
  levelTitle.textContent = `第 ${level} 关`;
  levelScreen.classList.remove('hidden');
  playSound(523, 0.1, 'sine', 0.06);
  setTimeout(() => playSound(659, 0.1, 'sine', 0.06), 150);
  setTimeout(() => playSound(784, 0.15, 'sine', 0.08), 300);
  levelTransitionTimer = 120;
}

function gameOver() {
  gameState = 'gameover';
  finalScoreEl.textContent = score;
  gameOverTitle.textContent = lives <= 0 ? '游 戏 结 束' : '你 赢 了 !';
  gameOverScreen.classList.remove('hidden');
  playSound(200, 0.3, 'sawtooth', 0.1);
}

function render() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  // 屏幕震动
  let sx = 0, sy = 0;
  if (shakeDuration > 0) {
    sx = (Math.random() - 0.5) * shakeAmount;
    sy = (Math.random() - 0.5) * shakeAmount;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // 绘制背景网格
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < WIDTH; x += TILE_SIZE) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, HEIGHT);
    ctx.stroke();
  }
  for (let y = 0; y < HEIGHT; y += TILE_SIZE) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WIDTH, y);
    ctx.stroke();
  }

  // 绘制地图
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const t = tileAt(col, row);
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      if (t === TILE.BRICK || t === TILE.BASE_BRICK) {
        ctx.fillStyle = '#b5651d';
        ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        ctx.fillStyle = '#cc7733';
        ctx.fillRect(x + 2, y + 2, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
        ctx.fillRect(x + TILE_SIZE / 2 + 1, y + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 3, TILE_SIZE / 2 - 3);
        ctx.strokeStyle = '#8b4513';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 3, TILE_SIZE - 3);
      } else if (t === TILE.STEEL) {
        ctx.fillStyle = '#8899aa';
        ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        const grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
        grad.addColorStop(0, '#aabbcc');
        grad.addColorStop(0.5, '#778899');
        grad.addColorStop(1, '#556677');
        ctx.fillStyle = grad;
        ctx.fillRect(x + 3, y + 3, TILE_SIZE - 6, TILE_SIZE - 6);
        ctx.strokeStyle = '#445566';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 5, TILE_SIZE - 5);
      } else if (t === TILE.WATER) {
        ctx.fillStyle = '#1565c0';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        const waveOffset = Math.sin(frameCount * 0.1 + col + row) * 2;
        ctx.strokeStyle = '#42a5f5';
        ctx.lineWidth = 1.5;
        for (let wy = y + 6; wy < y + TILE_SIZE; wy += 10) {
          ctx.beginPath();
          ctx.moveTo(x + 2, wy + waveOffset);
          ctx.lineTo(x + TILE_SIZE - 2, wy + waveOffset + Math.sin(frameCount * 0.12 + row) * 2);
          ctx.stroke();
        }
      }
    }
  }

  // 道具
  for (const p of powerUps) {
    const alpha = p.life < 120 ? (Math.sin(p.life * 0.3) > 0 ? 1 : 0.3) : 1;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.globalAlpha = alpha;
    // 光晕
    ctx.fillStyle = POWERUP_COLORS[p.type];
    ctx.shadowColor = POWERUP_COLORS[p.type];
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // 图标
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_LABELS[p.type], 0, 0);
    ctx.restore();
  }

  // 玩家
  if (player && player.alive) player.draw(ctx);

  // 敌人
  for (const enemy of enemies) {
    if (enemy.alive) enemy.draw(ctx);
  }

  // 子弹
  for (const bullet of bullets) {
    if (bullet.alive) bullet.draw(ctx);
  }

  // 粒子
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // 关卡过渡
  if (gameState === 'level-transition') {
    levelTransitionTimer--;
    if (levelTransitionTimer <= 0) {
      levelScreen.classList.add('hidden');
      loadLevel(level);
      updateUI();
      gameState = 'playing';
    }
  }

  // 暂停提示
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⏸  暂 停', WIDTH / 2, HEIGHT / 2);
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('按 P 继续', WIDTH / 2, HEIGHT / 2 + 40);
  }
}

// ── 事件监听 ──
window.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') {
      gameState = 'paused';
    } else if (gameState === 'paused') {
      gameState = 'playing';
    }
    return;
  }
  if (e.key === 'r' || e.key === 'R') {
    if (gameState === 'gameover') {
      gameOverScreen.classList.add('hidden');
      resetGame();
      gameState = 'playing';
    }
    return;
  }
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'j') e.preventDefault();
});

window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  startScreen.classList.add('hidden');
  resetGame();
  gameState = 'playing';
});

document.getElementById('restart-btn').addEventListener('click', () => {
  gameOverScreen.classList.add('hidden');
  resetGame();
  gameState = 'playing';
});

// ── 移动端触控支持 ──
let touchActive = {};
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  if (gameState === 'start') {
    startScreen.classList.add('hidden');
    resetGame();
    gameState = 'playing';
    return;
  }
  if (gameState === 'gameover') {
    gameOverScreen.classList.add('hidden');
    resetGame();
    gameState = 'playing';
    return;
  }
  for (const touch of e.changedTouches) {
    touchActive[touch.identifier] = { x: touch.clientX, y: touch.clientY };
  }
  updateTouchKeys();
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchActive[touch.identifier]) {
      touchActive[touch.identifier] = { x: touch.clientX, y: touch.clientY };
    }
  }
  updateTouchKeys();
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    delete touchActive[touch.identifier];
  }
  updateTouchKeys();
  // 射击
  if (Object.keys(touchActive).length === 0) {
    keys['w'] = keys['a'] = keys['s'] = keys['d'] = false;
  }
});

function updateTouchKeys() {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  keys['w'] = keys['a'] = keys['s'] = keys['d'] = false;
  keys[' '] = false;
  for (const id in touchActive) {
    const t = touchActive[id];
    const dx = t.x - cx;
    const dy = t.y - cy;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      keys[' '] = true; // 中心区域射击
    } else {
      if (Math.abs(dx) > Math.abs(dy)) {
        keys[dx > 0 ? 'd' : 'a'] = true;
      } else {
        keys[dy > 0 ? 's' : 'w'] = true;
      }
    }
  }
}

// ── 启动 ──
render();
gameLoop();
</script>
